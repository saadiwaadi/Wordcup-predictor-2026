name: World Cup 2026 Scrapers

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run Lineup Bot
        continue-on-error: true
        run: python scripts/bots/lineup_bot.py

      - name: Run Fixture Bot
        continue-on-error: true
        run: python scripts/bots/fixture_bot.py

      - name: Run Squad Bot
        continue-on-error: true
        run: python scripts/bots/squad_bot.py

      - name: Run Injury Bot
        continue-on-error: true
        run: python scripts/bots/injury_bot.py

      - name: Run Match Bot
        continue-on-error: true
        run: python scripts/bots/match_bot.py

      - name: Print record counts
        run: |
          python -c "
          import json, os
          base = 'public/data/scraped'
          files = ['fixtures.json', 'injuries.json', 
                   'squads.json', 'lineups.json']
          for f in files:
              path = os.path.join(base, f)
              if os.path.exists(path):
                  data = json.load(open(path))
                  count = len(data) if isinstance(data, list) else len(data.keys())
                  print(f'{f}: {count} records')
              else:
                  print(f'{f}: NOT FOUND')
          "

      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add public/data/scraped/
          if git diff --cached --quiet; then
            echo "No changes detected."
          else
            TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
            git commit -m "auto: scraper run [$TIMESTAMP]"
            git push
          fi
