name: World Cup 2026 Scrapers

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run Fixture Bot
        run: python scripts/bots/fixture_bot.py

      - name: Run Injury Bot
        run: python scripts/bots/injury_bot.py

      - name: Print record counts
        run: |
          python -c "import json, os; print('Fixtures count:', len(json.load(open('data/scraped/fixtures.json'))) if os.path.exists('data/scraped/fixtures.json') else 'N/A')"
          python -c "import json, os; print('Injuries count:', len(json.load(open('data/scraped/injuries.json'))) if os.path.exists('data/scraped/injuries.json') else 'N/A')"
          python -c "import json, os; print('Squads count:', len(json.load(open('data/scraped/squads.json'))) if os.path.exists('data/scraped/squads.json') else 'N/A')"

      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add data/scraped/
          if git diff --cached --quiet; then
            echo "No changes in data/scraped/ detected."
          else
            TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
            git commit -m "auto: scraper run - fixture_bot/injury_bot [$TIMESTAMP]"
            git push
          fi
