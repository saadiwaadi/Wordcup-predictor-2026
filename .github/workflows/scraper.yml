name: World Cup 2026 Scrapers

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run Fixture Bot
        continue-on-error: true
        run: python scripts/bots/fixture_bot.py

      - name: Run Squad Bot
        continue-on-error: true
        run: python scripts/bots/squad_bot.py

      - name: Run Injury Bot
        continue-on-error: true
        run: python scripts/bots/injury_bot.py

      - name: Run Lineup Bot
        continue-on-error: true
        run: python scripts/bots/lineup_bot.py

      - name: Run Match Bot
        continue-on-error: true
        run: python scripts/bots/match_bot.py

      - name: Print record counts
        run: |
          python -c "
          import json, os
          base = 'public/data/scraped'
          files = ['fixtures.json', 'injuries.json', 
                   'squads.json', 'lineups.json']
          for f in files:
              path = os.path.join(base, f)
              if os.path.exists(path):
                  data = json.load(open(path))
                  count = len(data) if isinstance(data, list) else len(data.keys())
                  print(f'{f}: {count} records')
              else:
                  print(f'{f}: NOT FOUND')
          "

      - name: Check if injuries.json should be committed
        id: check_injuries
        run: |
          python -c "
          import json, os, subprocess, time
          new_path = 'public/data/scraped/injuries.json'
          if not os.path.exists(new_path):
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write('should_commit=true\n')
              exit(0)
          try:
              old_content = subprocess.check_output(['git', 'show', 'HEAD:' + new_path]).decode('utf-8')
              old_data = json.loads(old_content)
          except Exception:
              old_data = None
          if not old_data:
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write('should_commit=true\n')
              exit(0)
          with open(new_path, 'r') as f:
              new_data = json.load(f)
          def normalize(data):
              if not isinstance(data, dict):
                  return {}
              res = {}
              for code, info in data.items():
                  res[code] = {
                      'team_id': info.get('team_id'),
                      'team_name': info.get('team_name'),
                      'injured_players': sorted(info.get('injured_players', []))
                  }
              return res
          if normalize(old_data) != normalize(new_data):
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write('should_commit=true\n')
              exit(0)
          try:
              last_commit_time_str = subprocess.check_output(['git', 'log', '-1', '--format=%ct', '--', new_path]).decode('utf-8').strip()
              if last_commit_time_str:
                  last_commit_time = int(last_commit_time_str)
                  if time.time() - last_commit_time > 86400:
                      with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                          f.write('should_commit=true\n')
                      exit(0)
          except Exception:
              pass
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write('should_commit=false\n')
          "

      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add public/data/scraped/fixtures.json public/data/scraped/squads.json public/data/scraped/lineups.json public/data/scraped/match_events.json 2>/dev/null || true
          if [ "${{ steps.check_injuries.outputs.should_commit }}" = "true" ]; then
            git add public/data/scraped/injuries.json
          else
            git checkout -- public/data/scraped/injuries.json 2>/dev/null || true
          fi
          if git diff --cached --quiet; then
            echo "No changes detected."
          else
            TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
            git commit -m "auto: scraper run [$TIMESTAMP]"
            git push
          fi
